<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book32 OS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <div class="brand">Book32</div>
            <ul class="nav-links">
                <li class="active" onclick="showTab('dashboard')">Dashboard</li>
                <li onclick="showTab('ereader')">Ereader</li>
                <li onclick="showTab('apps')">Apps</li>
                <li onclick="showTab('settings')">Settings</li>
            </ul>
            <div class="version">v<span id="version-display">1.0.0</span></div>
        </nav>

        <main class="content">
            <header class="top-bar">
                <div class="battery-status">
                    <span id="header-voltage"></span>
                    <i class="battery-icon" id="battery-icon" data-level="100"></i>
                </div>
            </header>

            <!-- Dashboard Tab -->
            <section id="dashboard" class="tab-content active">
                <h1>System Status</h1>
                <div class="stats-grid">
                    <div class="card stat">
                        <h3>Battery</h3>
                        <p id="battery-val">--%</p>
                    </div>
                    <div class="card stat">
                        <h3>Uptime</h3>
                        <p id="uptime-val">--</p>
                    </div>
                    <div class="card stat">
                        <h3>Free Space</h3>
                        <p id="freespace-val">--</p>
                    </div>
                    <div class="card stat">
                        <h3>Time</h3>
                        <p id="time-val">--:--</p>
                    </div>
                </div>
            </section>

            <!-- Ereader Tab -->
            <section id="ereader" class="tab-content">
                <h1>Ereader Library</h1>

                <div class="card">
                    <h3>Reader Options</h3>
                    <div class="setting-row">
                        <label for="refresh-rate">Full Refresh Interval (Pages)</label>
                        <input type="number" id="refresh-rate" min="1" max="100" value="6" style="width: 60px;">
                    </div>
                    <button class="btn secondary" onclick="saveReaderSettings()">Save Settings</button>
                    <div id="reader-settings-status" class="status-msg"></div>
                </div>

                <div class="card">
                    <h3>Upload Book</h3>
                    <p class="hint">Upload EPUB books directly</p>
                    <input type="file" id="book-file" accept=".epub,.ttf">
                    <button class="btn primary" onclick="uploadBook()">Upload</button>
                    <div id="upload-progress" class="progress-container hidden">
                        <div id="upload-progress-bar" class="progress-bar"></div>
                    </div>
                    <div id="upload-status"></div>
                </div>

                <div class="card">
                    <h3>Your Books</h3>
                    <div id="book-list">
                        <!-- Books injected by JS -->
                    </div>
                </div>
            </section>

            <!-- Apps Tab -->
            <section id="apps" class="tab-content">
                <h1>Manage Apps</h1>
                <div id="apps-list" class="apps-grid">
                    <!-- App cards injected by JS -->
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="settings" class="tab-content">
                <h1>Settings</h1>
                <div class="card setting-row">
                    <span>Bluetooth</span>
                    <label class="switch">
                        <input type="checkbox" id="bt-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="card update-card">
                    <h3>Software Update</h3>
                    <p>Current Version: <span id="current-ver">1.0.0</span></p>
                    <div id="update-status" class="status-msg"></div>
                    <button id="check-update-btn" class="btn primary" onclick="checkUpdate()">Check for Updates</button>
                    <button id="update-btn" class="btn primary hidden" onclick="performUpdate()">Install Update</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
